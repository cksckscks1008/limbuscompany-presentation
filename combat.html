    <main>
      <section class="page-section">
        <h1 class="section-title">전투 시스템 (Combat)</h1>
        <p class="section-desc">죄악 공명 및 스킬 연결 시스템</p>
        <div class="content-box">
          <h2>7가지 죄악 속성</h2>
          <p>
            분노, 색욕, 나태, 탐식, 우울, 오만, 질투의 7가지 죄악 속성을
            활용하여 적의 약점을 공략하십시오.
          </p>
          <br />
          <h2>스킬 연결 (Chain) 시스템</h2>
          <p>
            수감자들의 스킬 아이콘을 패널에서 드래그하여 연결합니다. 같은 죄악
            속성의 스킬을 2개 이상 연결하면 '죄악 공명'이 발생하여 위력이
            증가하며, 3개 이상 연결 시 강력한 '완전 공명'이 발동됩니다.
          </p>
        </div>
      </section>
      <div>
        <img src="src/type.png" alt="속성표" class="type">
      </div>
